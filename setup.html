<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play vs Bot · IPL Top Trumps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="stadium-bg" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;">

<div id="toast-container"></div>

<div class="setup-card">
  <a href="index.html" class="btn btn-secondary btn-icon" style="margin-bottom:20px;" aria-label="Back">←</a>
  <h2>⚔️ Play vs Bot</h2>

  <div class="form-group">
    <label class="form-label" for="player-name">Your Name</label>
    <input type="text" id="player-name" class="form-input" placeholder="Enter your name"
           maxlength="20" autocomplete="off">
  </div>

  <div class="form-group">
    <label class="form-label" for="difficulty">Bot Difficulty</label>
    <select id="difficulty" class="form-select">
      <option value="easy">🟢 Easy — Random picks</option>
      <option value="medium">🟡 Medium — Mixed strategy</option>
      <option value="hard" selected>🔴 Hard — Always best stat</option>
    </select>
  </div>

  <div class="form-group">
    <label class="form-label" for="card-count">Number of Cards per Player</label>
    <select id="card-count" class="form-select">
      <option value="10">10 cards — Quick (≈5 min)</option>
      <option value="20">20 cards — Short (≈10 min)</option>
      <option value="30">30 cards — Medium (≈15 min)</option>
      <option value="50">50 cards — Long (≈25 min)</option>
      <option value="73" selected>73 cards — Full deck (≈40 min)</option>
    </select>
  </div>

  <!-- Live preview -->
  <div style="padding:10px 14px;background:rgba(247,201,72,0.06);border:1px solid rgba(247,201,72,0.2);border-radius:10px;font-size:0.82rem;color:var(--text-secondary);margin-bottom:20px;">
    🃏 You'll each play with <strong style="color:var(--accent-gold)" id="hand-preview">73</strong> randomly selected IPL 2021 cards
  </div>

  <button id="btn-start" class="btn btn-primary btn-full">🏏 Start Match</button>
</div>

<script type="module">
  import { applySettings, showToast } from './js/shared.js';
  import { loadPlayers } from './js/csv-loader.js';
  import { shuffleArray } from './js/utils.js';
  applySettings();

  const cardCountEl  = document.getElementById('card-count');
  const handPreview  = document.getElementById('hand-preview');

  cardCountEl.addEventListener('change', () => {
    handPreview.textContent = cardCountEl.value;
  });

  document.getElementById('btn-start').addEventListener('click', async () => {
    const name      = document.getElementById('player-name').value.trim() || 'Player';
    const diff      = document.getElementById('difficulty').value;
    const cardCount = parseInt(cardCountEl.value);

    const allPlayers = await loadPlayers();
    // Take cardCount*2 random cards, split evenly
    const shuffled   = shuffleArray([...allPlayers]);
    const selected   = shuffled.slice(0, cardCount * 2);
    const playerDeck = selected.slice(0, cardCount);
    const botDeck    = selected.slice(cardCount);

    sessionStorage.setItem('ipl_game_state', JSON.stringify({
      mode:         'bot',
      playerName:   name,
      opponentName: `Bot (${diff})`,
      difficulty:   diff,
      playerDeck,
      opponentDeck: botDeck,
      pot:          [],
      round:        1,
      turn:         'player',
      locked:       false
    }));
    window.location.href = 'game.html';
  });
</script>
</body>
</html>
